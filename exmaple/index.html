<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>كاميرا رحاب - شركة رحاب للخدمات والتسويق المحدودة</title>
    
    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0A1950',
                        secondary: '#BE3D42',
                        gold: '#C5A059',
                    },
                    fontFamily: {
                        expo: ['"Expo Arabic"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @font-face {
            font-family: "Expo Arabic";
            src: url("/fonts/ExpoArabic-Light.ttf") format("truetype");
            font-weight: 300;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: "Expo Arabic";
            src: url("/fonts/ExpoArabic-Book.ttf") format("truetype");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: "Expo Arabic";
            src: url("/fonts/ExpoArabic-Medium.ttf") format("truetype");
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: "Expo Arabic";
            src: url("/fonts/ExpoArabic-SemiBold.ttf") format("truetype");
            font-weight: 600;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: "Expo Arabic";
            src: url("/fonts/ExpoArabic-Bold.otf") format("opentype");
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
        html, body {
            height: 100%;
        }
        html {
            font-family: "Expo Arabic", ui-sans-serif, system-ui, sans-serif;
        }
        body {
            position: relative;
            min-height: 100vh;
            background-color: #0A1950;
            overflow: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(180deg, #4D1213 0%, transparent 100%), linear-gradient(180deg, #c10007 0%, #0a1950 100%);
        }

        /* Hide scrollbars */
        ::-webkit-scrollbar {
            display: none;
        }

        /* Animation for flash effect */
        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        .flash-overlay {
            animation: flash 0.2s ease-out;
        }
    </style>
</head>
<body class="text-white h-screen w-screen flex flex-col relative font-expo">

    <!-- Header (Fixed Top) -->
    <header class="flex-none bg-black/50 backdrop-blur-xl border-b border-white/10 z-50 py-2 pt-[calc(0.5rem+env(safe-area-inset-top))] md:py-3">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="text-lg md:text-xl font-bold text-white flex items-center gap-2">
                <span class="text-gold">رحاب</span>
                <!-- <span>المحدودة</span> -->
            </div>
            <!-- Minimal Nav or Just Info -->
            <div class="text-[10px] md:text-xs text-gray-300">
                <span>نظام التوثيق</span>
            </div>
        </div>
    </header>

    <!-- Main Content Area (Flex Grow) -->
    <main class="flex-grow relative flex flex-col items-center justify-center p-0 md:p-4 w-full h-full overflow-hidden">
        
        <!-- Status / Error Messages -->
        <div id="error-message" class="hidden absolute top-4 left-0 right-0 mx-auto w-11/12 md:w-1/2 z-[60]">
            <div class="bg-red-500/90 text-white p-4 rounded-xl text-center shadow-lg border border-red-400">
                <p id="error-text">حدث خطأ في الوصول للكاميرا</p>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center z-40 bg-black/80 backdrop-blur-md p-6 text-center">
            <div class="mb-8 p-6 rounded-full bg-white/5 border border-white/10">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-4 text-white">توثيق الأعمال</h2>
            <p class="text-gray-300 mb-8 max-w-xs">الرجاء السماح بالوصول للكاميرا لتوثيق الأعمال مع التاريخ والوقت</p>
            <button id="start-btn" class="bg-gold hover:bg-yellow-600 text-black font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 flex items-center gap-2">
                <span>تشغيل الكاميرا</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </button>
        </div>

        <!-- Camera View -->
        <div id="camera-view" class="hidden w-full h-full md:relative md:max-w-4xl md:max-h-[85vh] bg-black md:rounded-2xl overflow-hidden shadow-2xl border-0 md:border border-white/10">
            <div class="relative w-full h-full bg-black">
                <video id="video" class="w-full h-full object-cover" autoplay playsinline muted></video>
                <!-- Flash Overlay -->
                <div id="flash-overlay" class="absolute inset-0 bg-white opacity-0 pointer-events-none z-10"></div>
            </div>
        </div>

        <!-- Result View (Hidden by default) -->
        <div id="result-view" class="hidden w-full h-full md:relative md:max-w-4xl md:max-h-[85vh] bg-black md:rounded-2xl border-0 md:border border-white/10 overflow-hidden shadow-2xl">
            <div class="relative w-full h-full bg-black flex items-center justify-center pb-36 md:pb-40">
                <img id="captured-image" src="" alt="Captured Photo" class="w-full h-full object-contain md:rounded-t-2xl">
            </div>
        </div>

        <!-- Hidden Canvas for processing -->
    <canvas id="canvas" class="hidden"></canvas>

    <script>
        // DOM Elements
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const startBtn = document.getElementById("start-btn");
        const captureBtn = document.getElementById("capture-btn");
        const captureFloating = document.getElementById("capture-floating");
        const previewFloating = document.getElementById("preview-floating");
        const retakeBtn = document.getElementById("retake-btn");
        const downloadBtn = document.getElementById("download-btn");
        const shareBtn = document.getElementById("share-btn");
        const capturedImg = document.getElementById("captured-image");
        const startScreen = document.getElementById("start-screen");
        const cameraView = document.getElementById("camera-view");
        const resultView = document.getElementById("result-view");
        const flashOverlay = document.getElementById("flash-overlay");
        const errorMessage = document.getElementById("error-message");
        const errorText = document.getElementById("error-text");

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    }, (err) => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }

        let stream = null;
        let currentBlobUrl = null;
        let currentBlob = null;

        // Initialize Camera
        async function startCamera() {
            try {
                // Request camera access
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "environment", // Prefer back camera
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }, 
                    audio: false 
                });
                
                video.srcObject = stream;
                
                // Wait for video to be ready
                video.onloadedmetadata = () => {
                    video.play();
                    // Switch views
                    startScreen.classList.add("hidden");
                    cameraView.classList.remove("hidden");
                    cameraView.classList.add("flex");
                    captureFloating.classList.remove("hidden");
                    previewFloating.classList.add("hidden");
                    errorMessage.classList.add("hidden");
                };

            } catch (err) {
                console.error("Error accessing camera: ", err);
                showError("تعذر الوصول للكاميرا. الرجاء التأكد من منح الصلاحيات.");
            }
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorMessage.classList.remove("hidden");
        }

        // Capture Photo
        function capturePhoto() {
            if (!stream) return;

            // Flash effect
            flashOverlay.classList.add("flash-overlay");
            setTimeout(() => flashOverlay.classList.remove("flash-overlay"), 200);

            // Set canvas dimensions to match video stream
            // Use videoWidth/Height for full resolution
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const ctx = canvas.getContext("2d");
            
            // Draw current video frame
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Add Overlay (Date/Time)
            const now = new Date();
            
            // Format: YYYY/MM/DD - {day name} HH:MM:SS
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const dayName = now.toLocaleDateString('ar-SA', { weekday: 'long' });
            
            let hours = now.getHours();
            const ampm = hours >= 12 ? 'م' : 'ص';
            hours = hours % 12;
            hours = hours ? hours : 12; // the hour '0' should be '12'
            
            const hh = String(hours).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');

            const fullText = `${yyyy}/${mm}/${dd} - ${dayName} ${hh}:${min}:${ss} ${ampm}`;

            // Overlay Styling - Optimized for Mobile
            const minDim = Math.min(canvas.width, canvas.height);
            const fontSize = Math.floor(minDim / 30); // Reduced size: ~3.3% of the smallest dimension
            const padding = fontSize * 0.8;
            
            ctx.font = `bold ${fontSize}px 'Cairo', sans-serif`;
            const textMetrics = ctx.measureText(fullText);
            const textWidth = textMetrics.width;
            const bgHeight = fontSize * 1.8;
            const bgWidth = textWidth + (padding * 2);
            
            // Position: Bottom Right
            const xPos = canvas.width - bgWidth - padding;
            const yPos = canvas.height - bgHeight - padding;

            // Draw Background Box for Text
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.roundRect 
                ? ctx.roundRect(xPos, yPos, bgWidth, bgHeight, fontSize * 0.5) // Use roundRect if supported
                : ctx.fillRect(xPos, yPos, bgWidth, bgHeight); // Fallback
            if(ctx.roundRect) ctx.fill();

            // Draw Text
            ctx.fillStyle = "#C5A059"; // Gold color
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(fullText, xPos + (bgWidth / 2), yPos + (bgHeight / 2) + (fontSize * 0.1)); // slight vertical adjustment

            // Draw Logo (Bottom Left) - Optimized
            const logoImg = document.getElementById("logo-img");
            if (logoImg.complete && logoImg.naturalWidth > 0) {
                // Use min dimension for logo scaling too, to prevent it being huge on portrait
                const logoTargetHeight = minDim * 0.12; // 12% of smallest dimension
                const aspectRatio = logoImg.naturalWidth / logoImg.naturalHeight;
                const logoWidth = logoTargetHeight * aspectRatio;
                
                const logoX = padding;
                const logoY = canvas.height - logoTargetHeight - padding;
                
                ctx.save();
                ctx.globalAlpha = 0.2; // 20% opacity
                ctx.drawImage(logoImg, logoX, logoY, logoWidth, logoTargetHeight);
                ctx.restore();
            } else {
                // Fallback text if logo fails to load
                ctx.save();
                ctx.globalAlpha = 0.2;
                ctx.font = `bold ${fontSize * 1.5}px 'Cairo', sans-serif`;
                ctx.fillStyle = "white";
                ctx.textAlign = "left";
                ctx.fillText("Rehab Co.", padding, canvas.height - padding);
                ctx.restore();
            }

            // Convert to Image (Blob for better performance)
            canvas.toBlob((blob) => {
                if (!blob) {
                    console.error("Canvas to Blob failed");
                    return;
                }

                // Cleanup previous blob URL if exists
                if (currentBlobUrl) {
                    URL.revokeObjectURL(currentBlobUrl);
                }

                currentBlob = blob;
                currentBlobUrl = URL.createObjectURL(blob);
                capturedImg.src = currentBlobUrl;

                // Switch Views
                cameraView.classList.add("hidden");
                cameraView.classList.remove("flex");
                captureFloating.classList.add("hidden");
                previewFloating.classList.remove("hidden");
                resultView.classList.remove("hidden");
                resultView.classList.add("flex"); // Ensure flex display
            }, 'image/png');
        }

        // Retake Photo
        function retakePhoto() {
            // Cleanup blob URL
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = null;
                capturedImg.src = "";
            }
            currentBlob = null;

            resultView.classList.add("hidden");
            resultView.classList.remove("flex");
            cameraView.classList.remove("hidden");
            cameraView.classList.add("flex");
            captureFloating.classList.remove("hidden");
            previewFloating.classList.add("hidden");
            // Video stream should still be active
        }

        // Download Photo
        function downloadPhoto() {
            if (!currentBlobUrl && !capturedImg.src) return;
            
            const link = document.createElement("a");
            const now = Date.now();
            link.download = `rehab-photo-${now}.png`;
            link.href = currentBlobUrl || capturedImg.src;
            document.body.appendChild(link); // Required for Firefox
            link.click();
            document.body.removeChild(link);
        }

        function sharePhoto() {
            if (!currentBlob) return;

            const now = Date.now();
            const file = new File([currentBlob], `rehab-photo-${now}.png`, { type: currentBlob.type || "image/png" });
            const shareData = { files: [file], title: "مشاركة الصورة", text: "صورة موثقة" };

            if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
                navigator.share(shareData);
                return;
            }

            if (navigator.share && currentBlobUrl) {
                navigator.share({ title: "مشاركة الصورة", text: "صورة موثقة", url: currentBlobUrl });
                return;
            }

            downloadPhoto();
        }

        // Event Listeners
        startBtn.addEventListener("click", startCamera);
        captureBtn.addEventListener("click", capturePhoto);
        retakeBtn.addEventListener("click", retakePhoto);
        downloadBtn.addEventListener("click", downloadPhoto);
        shareBtn.addEventListener("click", sharePhoto);

        // Handle page visibility change (optional: stop camera when tab hidden to save battery)
        document.addEventListener("visibilitychange", () => {
            if (document.hidden && stream) {
                // Optional: pause video or stop tracks
            }
        });

    </script>
</body>
